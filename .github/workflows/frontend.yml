name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # npm install (not ci) so platform-specific optional deps are resolved
      # correctly on Linux regardless of where the lockfile was generated.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
        working-directory: frontend

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      # Prisma 7 does not auto-generate types on install — must run explicitly
      # before TypeScript can resolve @prisma/client exports.
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test
        working-directory: frontend
