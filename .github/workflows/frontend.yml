name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No npm cache — avoids restoring Windows-generated node_modules
          # that are missing Linux-specific optional binaries (e.g. rollup)

      # --include=optional forces platform-specific optional deps (rollup native)
      - name: Install dependencies
        run: npm install --include=optional

      # Use workspace flag (-w) to target frontend scripts from repo root —
      # avoids working-directory confusion with npm workspace resolution
      - name: Lint
        run: npm run lint -w frontend

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --include=optional

      # Prisma 7 does not auto-generate types — required before tsc
      - name: Generate Prisma client
        run: npm run db:generate -w frontend

      - name: Typecheck
        run: npm run typecheck -w frontend

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --include=optional

      # The root package-lock.json is generated on Windows and omits
      # @rollup/rollup-linux-x64-gnu (Linux native binary required by vitest).
      # npm has a known bug where it doesn't reinstall platform-specific
      # optional deps from a cross-platform lockfile. Install it explicitly.
      - name: Install Linux rollup native binary
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Test
        run: npm test -w frontend
