name: Lint (PR)

on:
  pull_request:

jobs:
  lint-frontend:
    name: ESLint — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No cache — avoids stale node_modules with missing optional binaries

      - name: Install dependencies
        run: npm install --include=optional

      - name: Lint
        run: npm run lint -w frontend

  lint-contracts:
    name: Clippy — Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contracts/**/Cargo.toml') }}
      - name: Clippy — escrow
        run: cd contracts/escrow && cargo clippy --all-targets --all-features -- -D warnings
